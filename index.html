<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; background: #f4f4f4; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: white; border-radius: 8px; }
        select { padding: 10px; font-size: 16px; width: 90%; margin-bottom: 20px; border-radius: 5px; }
        .status-msg { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h2>セミナー受付システム</h2>
    
    <select id="seminar-select">
        <option value="A会場_午前の部">A会場_午前の部</option>
        <option value="B会場_セミナー">B会場_セミナー</option>
    </select>

    <div id="reader"></div>
    <div id="status" class="status-msg"></div>

    <script>
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.pause();
            const seminarName = document.getElementById('seminar-select').value;
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "照合中...";

            google.script.run.withSuccessHandler(function(res) {
                if (res.status === "error") {
                    alert(res.message);
                    statusDiv.innerText = "";
                    html5QrcodeScanner.resume();
                } else if (res.status === "walk-in") {
                    // 当日受付の確認ダイアログ
                    const msg = "【予約なし】残席：" + res.remaining + "\n\n" +
                                res.userData.company + "\n" +
                                res.userData.last + " " + res.userData.first + " 様\n\n" +
                                "当日参加を受け入れますか？";
                    if (confirm(msg)) {
                        executeCheckIn(decodedText, seminarName);
                    } else {
                        statusDiv.innerText = "";
                        html5QrcodeScanner.resume();
                    }
                } else {
                    // 予約あり：そのまま実行
                    executeCheckIn(decodedText, seminarName);
                }
            }).getCheckInStatus(decodedText, seminarName);
        }

        function executeCheckIn(qrData, seminarName) {
            document.getElementById('status').innerText = "登録中...";
            google.script.run.withSuccessHandler(function(msg) {
                alert(msg);
                document.getElementById('status').innerText = "";
                html5QrcodeScanner.resume();
            }).recordSeminarCheckIn(qrData, seminarName);
        }

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
